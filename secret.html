<!-- secret.html - PAGE SOMBRE BRUMEUSE (Code 7392) -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            color: #888;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: default;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
        }
        .fog {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(30,30,30,0.4) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(20,20,20,0.3) 0%, transparent 40%),
                        radial-gradient(circle at 40% 20%, rgba(25,25,25,0.35) 0%, transparent 45%);
            animation: fogMove 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 2;
        }
        @keyframes fogMove {
            0%, 100% { transform: translate(-10%, -10%); }
            33% { transform: translate(5%, 5%); }
            66% { transform: translate(-5%, 10%); }
        }
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
            pointer-events: none;
            z-index: 3;
        }
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
        }
        .glitch-code {
            font-size: 64px;
            letter-spacing: 30px;
            color: #666;
            position: relative;
            animation: glitch 4s infinite;
            text-shadow: 0 0 10px rgba(100,100,100,0.3);
        }
        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); opacity: 1; }
            92% { transform: translate(-3px, 1px); opacity: 0.8; }
            94% { transform: translate(2px, -1px); opacity: 0.9; }
            96% { transform: translate(-1px, 2px); opacity: 0.7; }
            98% { transform: translate(1px, -2px); opacity: 1; }
        }
        .hint {
            margin-top: 60px;
            font-size: 12px;
            color: #333;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeInHint 3s ease-out 2s forwards;
        }
        @keyframes fadeInHint { to { opacity: 1; } }
        .back {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: #222;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
            transition: color 0.3s;
            z-index: 100;
        }
        .back:hover { color: #444; }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(100,100,100,0.3);
            border-radius: 50%;
            animation: float 15s infinite;
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="fog"></div>
    <div class="scanlines"></div>
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 5s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 10s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 7s;"></div>

    <div class="container">
        <div class="glitch-code">7392</div>
        <div class="hint">RETOURNE DANS LE PANIER</div>
    </div>

    <a href="index.html" class="back">← fermer</a>

    <script>
        setInterval(() => {
            const code = document.querySelector('.glitch-code');
            if (Math.random() > 0.95) {
                code.style.filter = 'blur(1px)';
                setTimeout(() => { code.style.filter = 'none'; }, 100);
            }
        }, 2000);
        setInterval(() => {
            document.body.style.opacity = '0.95';
            setTimeout(() => { document.body.style.opacity = '1'; }, 50);
        }, 8000);
    </script>
</body>
</html>
