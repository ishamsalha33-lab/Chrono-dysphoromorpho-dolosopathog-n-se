<!-- final.html - PAGE FINALE -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #020202;
            color: #777;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Bruit de fond */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.5;
            pointer-events: none;
            z-index: 1;
        }

        /* Brume plus dense */
        .fog {
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(15,15,15,0.6) 0%, transparent 60%),
                radial-gradient(circle at 20% 80%, rgba(10,10,10,0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(12,12,12,0.5) 0%, transparent 55%);
            animation: fogMove 25s ease-in-out infinite;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes fogMove {
            0%, 100% { transform: translate(-5%, -5%) scale(1); }
            33% { transform: translate(10%, 5%) scale(1.1); }
            66% { transform: translate(-10%, 10%) scale(0.95); }
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.15) 3px,
                rgba(0,0,0,0.15) 6px
            );
            pointer-events: none;
            z-index: 3;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            padding: 40px;
            text-align: center;
        }

        .final-text {
            font-size: 16px;
            line-height: 2.2;
            color: #555;
            text-shadow: 0 0 5px rgba(100,100,100,0.2);
            opacity: 0;
            animation: reveal 6s ease-out forwards;
        }

        @keyframes reveal {
            0% { opacity: 0; filter: blur(5px); letter-spacing: 5px; }
            50% { opacity: 0.5; filter: blur(2px); }
            100% { opacity: 1; filter: blur(0); letter-spacing: normal; }
        }

        .code-final {
            display: inline-block;
            margin-top: 40px;
            padding: 20px 40px;
            border: 1px solid #333;
            color: #888;
            font-size: 28px;
            letter-spacing: 8px;
            background: rgba(10,10,10,0.5);
            opacity: 0;
            animation: reveal 6s ease-out 3s forwards;
        }

        .back {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
            transition: color 0.3s;
            z-index: 100;
        }

        .back:hover {
            color: #333;
        }

        /* Lignes glitch horizontales rares */
        .glitch-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(50,50,50,0.3);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes glitchLine {
            0% { opacity: 0; transform: translateX(-100%); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="fog"></div>
    <div class="scanlines"></div>

    <div class="container">
        <div class="final-text">
            Tu as trouvé ce qui était caché.<br><br>
            
            La vérité n'appartient qu'à ceux<br>
            qui osent chercher dans l'obscurité.<br><br>
            
            Le monde que tu connais n'est qu'une façade.<br>
            Derrière chaque ombre se cache une réponse.<br><br>
            
            Utilise ce code pour déverrouiller<br>
            la fin véritable.
        </div>
        
        <div class="code-final">PHOENIX</div>
    </div>

    <a href="index.html" class="back">← fermer</a>

    <script>
        // Créer des lignes glitch aléatoires
        setInterval(() => {
            if (Math.random() > 0.7) {
                const line = document.createElement('div');
                line.className = 'glitch-line';
                line.style.top = Math.random() * 100 + '%';
                line.style.animation = 'glitchLine 0.3s ease-out forwards';
                document.body.appendChild(line);
                setTimeout(() => line.remove(), 300);
            }
        }, 3000);

        // Distorsion occasionnelle du texte
        setInterval(() => {
            const text = document.querySelector('.final-text');
            if (Math.random() > 0.9) {
                text.style.transform = 'translateX(1px)';
                setTimeout(() => {
                    text.style.transform = 'translateX(-1px)';
                    setTimeout(() => {
                        text.style.transform = 'none';
                    }, 50);
                }, 50);
            }
        }, 4000);
    </script>
</body>
</html>
