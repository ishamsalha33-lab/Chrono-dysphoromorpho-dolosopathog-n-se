        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,0,0.03) 2px, rgba(0,255,0,0.03) 4px);

            z-index: 1;
        }
        #terminal {
            position: relative;
            z-index: 10;
            height: 100%;
            overflow-y: auto;
        }
        .line {
            margin-bottom: 5px;
            word-wrap: break-word;
        }
        .prompt {
            color: #0f0;
        }
        .output {
            color: #0a0;
            margin-left: 0;
            margin-bottom: 10px;
        }
        .error {
            color: #f00;
        }
        .warning {
            color: #ff0;
        }
        .input-line {
            display: flex;
            align-items: center;
        }
        #cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #0f0;
            animation: blink 1s infinite;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .typing {
            animation: none;
        }
        .hidden-link {
            color: #0a0;
            text-decoration: none;
        }
        .hidden-link:hover {
            color: #0f0;
            text-decoration: underline;
        }
        .back {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #030;
            text-decoration: none;
            font-size: 11px;
            z-index: 100;
            transition: color 0.3s;
        }
        .back:hover { color: #0f0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #0f0; }
    </style>
</head>

        function addLine(text, className = '') {
            const line = document.createElement('div');
            line.className = 'line ' + className;
            line.textContent = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function addPrompt() {
            const line = document.createElement('div');
            line.className = 'line input-line';
            line.innerHTML = '<span class="prompt">root@herman-archives:~# </span><span id="currentInput"></span><span id="cursor"></span>';
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
            return line;
        }

        async function typeBoot() {
            for (let item of bootText) {
                await new Promise(r => setTimeout(r, item.delay));
                addLine(item.text, item.class || '');
            }
            addPrompt();
            setupInput();
        }

        function setupInput() {
            let currentInput = '';
            const inputSpan = document.getElementById('currentInput');
            
            document.addEventListener('keydown', function handler(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const cmd = currentInput.trim().toLowerCase();
                    commandHistory.push(cmd);
                    historyIndex = commandHistory.length;
                    
                    // Remove cursor and input line
                    const cursor = document.getElementById('cursor');
                    if (cursor) cursor.remove();
                    
                    // Process command
                    processCommand(cmd);
                    
                    // Add new prompt
                    addPrompt();
                    currentInput = '';
                    
                    // Setup new input
                    const newInput = document.getElementById('currentInput');
                    document.removeEventListener('keydown', handler);
                    setupInputListener(newInput);
                } else if (e.key === 'Backspace') {
                    e.preventDefault();
                    currentInput = currentInput.slice(0, -1);
                    inputSpan.textContent = currentInput;
                } else if (e.key.length === 1) {
                    currentInput += e.key;
                    inputSpan.textContent = currentInput;
                }
            });
        }

        function setupInputListener(inputSpan) {
            let currentInput = '';
            document.addEventListener('keydown', function handler(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const cmd = currentInput.trim().toLowerCase();
                    commandHistory.push(cmd);
                    historyIndex = commandHistory.length;
                    
                    const cursor = document.getElementById('cursor');
                    if (cursor) cursor.remove();
                    
                    processCommand(cmd);
                    addPrompt();
                    currentInput = '';
                    document.removeEventListener('keydown', handler);
                    setupInputListener(document.getElementById('currentInput'));
                } else if (e.key === 'Backspace') {
                    e.preventDefault();
                    currentInput = currentInput.slice(0, -1);
                    inputSpan.textContent = currentInput;
                } else if (e.key.length === 1) {
                    currentInput += e.key;
                    inputSpan.textContent = currentInput;
                }
            });
        }

        function processCommand(cmd) {
            if (cmd === 'clear') {
                terminal.innerHTML = '';
                return;
            }
            if (cmd === 'exit') {
                addLine('Fermeture de la session...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                return;
            }
            if (cmd === '26/11/2006') {
                addLine('', 'output');
                addLine('═══════════════════════════════════════════════════', 'output');
                addLine('RAPPORT D\'INCIDENT - 26 NOVEMBRE 2006', 'warning');
                addLine('═══════════════════════════════════════════════════', 'output');
                addLine('', 'output');
                addLine('Ce que vous appelez "bureau" n\'en est pas un.', 'output');

                addLine('sous le sol de ce bâtiment, s\'étendent 7 niveaux', 'output');
                addLine('de laboratoires souterrains.', 'output');
                addLine('', 'output');
                addLine('Là-bas, on ne vend pas de produits.', 'output');
                addLine('Là-bas, on brise des esprits pour comprendre', 'output');
                addLine('la nature de leur prison.', 'output');
                addLine('', 'output');
                addLine('Le Dr. Herman Voss a découvert la vérité:', 'output');
                addLine('notre monde est une simulation maintenue par', 'output');
                addLine('des entités que l\'Institut nomme "Les Architectes".', 'output');
                addLine('', 'output');
                addLine('Les expériences sur les humains visaient à identifier', 'output');
                addLine('ceux capables de percevoir les "coutures" de la réalité.', 'output');
                addLine('Ceux qui voient les failles. Ceux qui rêvent éveillés.', 'output');
                addLine('', 'output');
                addLine('Herman était le sujet le plus prometteur.', 'output');
                addLine('Il voyait trop clair. Il comprenait trop bien.', 'output');
                addLine('', 'output');
                addLine('Alors il a choisi de sortir.', 'output');
                addLine('Pas de mourir. De TRANSCENDER.', 'output');
                addLine('', 'output');
                addLine('Le 26/11/2006 à 03:47, le protocole Éveil a été activé.', 'output');
                addLine('Les caméras ont filmé son corps se désintégrer en', 'output');
                addLine('milliers de points lumineux gris.', 'output');
                addLine('', 'output');
                addLine('Il a laissé un dernier message:', 'output');
                addLine('"Ne me cherchez pas. Cherchez la sortie."', 'output');
                addLine('', 'output');
                addLine('═══════════════════════════════════════════════════', 'output');
                addLine('do you feel fear?', 'error');
                addLine('═══════════════════════════════════════════════════', 'output');
                return;
            }
            
            if (commands[cmd]) {
                const output = commands[cmd];
                if (output === '__CLEAR__') {
                    terminal.innerHTML = '';
                    return;
                }
                output.split('\n').forEach(line => {
                    addLine(line, 'output');
                });
            } else if (cmd) {
                addLine(`Commande non trouvée: ${cmd}`, 'error');
                addLine('Tapez "help" pour la liste des commandes.', 'output');
            }
        }

        // Start boot sequence
        typeBoot();
    </script>
